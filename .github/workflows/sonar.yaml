name: SonarQube Analysis

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Fixed version
        with:
          fetch-depth: 0 # Important for SonarCloud

      - name: Set up Node.js
        uses: actions/setup-node@v4 # Fixed path & version
        with:
          node-version: '20' # Changed to a stable version (20 or 22)
          cache: 'npm'
      
      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=aravindroy1_hospital-management-system
            -Dsonar.organization=aravindroy1
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.qualitygate.wait=true

      - name: Send Email On Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465 # Reverted to 465 for Gmail SSL
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "⚠️ CRITICAL FAILURE: TEAM MURALI - THE BUILD IS BROKEN! ⚠️"
          to: aknagasai0421@gmail.com # MAKE SURE TO ADD THIS LINE
          from: GitHub Actions
          body: |
            💀 ATTENTION TEAM MURALI! 💀

            The pipeline has CRASHED on branch: ${{ github.head_ref || github.ref_name }}.
            
            This is a CRITICAL failure. Quality gates or builds have failed and 
            this requires IMMEDIATE intervention before the world ends.

            --------------------------------------------------
            👤 Triggered by: ${{ github.actor }}
            📦 Repository: ${{ github.repository }}
            🔴 Commit Hash: ${{ github.sha }}
            --------------------------------------------------

            🛑 STOP WHAT YOU ARE DOING AND FIX IT HERE:
            https://github.com/${{ github.repository }}/actions

            Good luck, Team Murali. You're going to need it.
