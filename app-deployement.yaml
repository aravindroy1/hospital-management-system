apiVersion: v1
kind: ConfigMap
metadata:
  name: hospital-config
data:
  MONGO_URI: "mongodb://hospital-mongo-service:27017/hospital_management"
  PORT: "5000"
  NODE_ENV: "production"
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hospital-app
  template:
    metadata:
      labels:
        app: hospital-app
    spec:
      containers:
      - name: hospital-app
        image: 10kartikey/hospital-management-system-hospital-app:latest
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: hospital-config

apiVersion: v1
kind: Service
metadata:
  name: hospital-service
spec:
  selector:
    app: hospital-app
  ports:
  - port: 80
    targetPort: 5000
  type: LoadBalancer
